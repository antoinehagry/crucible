<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request received — Crucible</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#4C1D95">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background:#FBFAF7; color:#14181F; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  a { color: inherit; }
  ::selection { background-color:#6D28D9; color:#FBFAF7; }
  ::-moz-selection { background-color:#6D28D9; color:#FBFAF7; }
  :focus-visible { outline: 2px solid #6D28D9; outline-offset: 3px; }

  /* Cross-document page transitions (native View Transitions; fade-in fallback elsewhere) */
  @view-transition { navigation: auto; }
  ::view-transition-old(root) { animation:vt-out .25s cubic-bezier(.4,0,.2,1) both; }
  ::view-transition-new(root) { animation:vt-in .35s cubic-bezier(.16,.7,.3,1) both; }
  @keyframes vt-out { to { opacity:0; transform:translateY(-8px); } }
  @keyframes vt-in { from { opacity:0; transform:translateY(10px); } }
  @keyframes page-in { from { opacity:0; } }
  @supports not (view-transition-name: root) {
    body { animation:page-in .4s ease both; }
  }
  .no-xdoc-vt body { animation:page-in .4s ease both; }
  @media (prefers-reduced-motion: reduce) {
    ::view-transition-group(*), ::view-transition-image-pair(*), ::view-transition-old(*), ::view-transition-new(*), body { animation:none !important; }
  }
</style>
<script>if (!('PageRevealEvent' in window)) document.documentElement.className += ' no-xdoc-vt';</script>
</head>
<body>
  <main style="max-width:620px; padding:clamp(40px,8vw,80px) clamp(20px,5vw,48px); text-align:center;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:12.5px; letter-spacing:0.14em; text-transform:uppercase; color:#6D28D9; margin-bottom:24px;">Request received</div>
    <h1 style="font-family:'Fraunces',serif; font-weight:500; font-size:clamp(2.2rem,5.5vw,3.4rem); line-height:1.06; letter-spacing:-0.02em; margin:0 0 22px;">Thanks — your request is in.</h1>
    <p style="font-size:clamp(16px,1.6vw,18px); line-height:1.62; color:#4A535F; margin:0 0 36px;">I'll come back with a scope confirmation and a turnaround date — not a sales call. Expect a reply within one business day at the address you gave.</p>
    <a href="./" style="text-decoration:none; display:inline-flex; align-items:center; gap:10px; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.05em; text-transform:uppercase; color:#14181F; border:1px solid #14181F; padding:14px 24px;"><span style="font-size:15px;">&larr;</span> Back to Crucible</a>
  </main>
</body>
</html>
